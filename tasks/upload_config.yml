- name: Validate variables for upload_config.yml task
  ansible.builtin.assert:
    that:
      - mysql_config_dir is defined
      - mysql_file_owner is defined
      - mysql_file_group is defined
      - mysql_server_id is defined
      - mysql_config is defined
      - mysql_config is mapping
      - mysql_dump_path is defined

- name: Deploy mysql config
  ansible.builtin.template:
    src: mysqld.conf.j2
    dest: "{{ mysql_config_dir }}/mysqld.cnf"
    owner: "{{ mysql_file_owner }}"
    group: "{{ mysql_file_group }}"
    mode: '0644'
